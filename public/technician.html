<!DOCTYPE html>
<html>
<head>
  <title>Vinton Solutions - Technician Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="dashboard-header">
      <h1>Vinton Solutions</h1>
      <p>Technician Dashboard</p>
    </div>

    <div class="actions">
      <button onclick="logout()">Logout</button>
    </div>

    <div id="techInfo" class="stats-box"></div>
    <div id="jobs"></div>
  </div>

  <script>
    async function logout() {
      await fetch('/api/admin/logout', {
        method: 'POST',
        credentials: 'include'
      });
      window.location.href = '/login';
    }

    async function fetchMe() {
      const response = await fetch('/api/admin/me', {
        credentials: 'include'
      });

      if (!response.ok) {
        window.location.href = '/login';
        return null;
      }

      const data = await response.json();

      if (!data.user || data.user.role !== "technician") {
        window.location.href = '/login';
        return null;
      }

      document.getElementById('techInfo').innerHTML = `
        <h3>Welcome, ${data.user.name}</h3>
        <p><strong>Role:</strong> ${data.user.role}</p>
      `;

      return data.user;
    }

    async function updateJobStatus(id, newStatus) {
      if (!newStatus) return;

      const response = await fetch(`/api/bookings/technician/update-status/${id}`, {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      const data = await response.json();

      if (response.status === 401 || response.status === 403) {
        alert(data.message || "You are not allowed to update this job.");
        window.location.href = '/login';
        return;
      }

      if (!response.ok) {
        alert(`Failed to update status: ${data.message || "Unknown error"}`);
        return;
      }

      fetchJobs();
    }

    async function fetchJobs() {
      const response = await fetch('/api/bookings/technician/my-jobs', {
        credentials: 'include'
      });

      if (response.status === 401 || response.status === 403) {
        window.location.href = '/login';
        return;
      }

      const jobs = await response.json();
      const container = document.getElementById('jobs');
      container.innerHTML = '';

      if (!jobs.length) {
        container.innerHTML = '<p>No assigned jobs yet.</p>';
        return;
      }

      jobs.forEach(job => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <p><strong>Ref:</strong> ${String(job._id).slice(-6).toUpperCase()}</p>
          <p><strong>Name:</strong> ${job.name}</p>
          <p><strong>Phone:</strong> ${job.phone}</p>
          <p><strong>Device:</strong> ${job.deviceType}</p>
          <p><strong>Service:</strong> ${job.serviceType || ""}</p>
          <p><strong>Issue:</strong> ${job.issueDescription}</p>
          <p><strong>Status:</strong> ${job.status}</p>
          <p><strong>Price Range:</strong> ${job.priceRange || "Not set"}</p>
          <p><strong>Pickup:</strong> ${job.pickupOption || "Walk-in"}</p>
          <p><strong>Location Notes:</strong> ${job.locationNotes || ""}</p>
          <p><strong>Date:</strong> ${new Date(job.bookingDate).toDateString()}</p>

          <div class="inline-group" style="margin-top: 12px;">
            <select onchange="updateJobStatus('${job._id}', this.value)">
              <option value="">Update Status</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        `;

        container.appendChild(div);
      });
    }

    async function init() {
      const user = await fetchMe();
      if (user) fetchJobs();
    }

    init();
  </script>
</body>
</html>
