<!DOCTYPE html>
<html>
<head>
  <title>Vinton Solutions - Check Repair Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <img src="/images/logo.jpeg" class="logo" />
<div class="brand-title">Vinton Solutions</div>
<div class="brand-sub">Reliable Electronics Repair Services</div>
      <p>Track your repair progress easily.</p>
    </div>

    <h2>Check Your Repair Status</h2>

    <form id="lookupForm">
      <label for="ref">Reference Code</label>
      <input type="text" id="ref" placeholder="Enter reference code (e.g. A1B2C3)" required />

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" placeholder="Enter phone number" required />

      <button type="submit">Check Status</button>
    </form>

    <div id="result" class="stats-box" style="display:none;"></div>
    <p id="message" class="message"></p>
  </div>

  <script>
    document.getElementById("lookupForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const ref = document.getElementById("ref").value.trim();
      const phone = document.getElementById("phone").value.trim();

      const response = await fetch("/api/bookings/lookup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ref, phone })
      });

      const resultDiv = document.getElementById("result");
      const messageEl = document.getElementById("message");

      resultDiv.style.display = "none";
      resultDiv.innerHTML = "";
      messageEl.innerText = "";

      if (!response.ok) {
        const error = await response.json();
        messageEl.innerText = error.message || "Booking not found";
        messageEl.style.color = "red";
        return;
      }

      const data = await response.json();

      resultDiv.style.display = "block";
      renderResult(data);
    });

      function renderResult(data) {
        const resultDiv = document.getElementById("result");

          resultDiv.innerHTML = `
        <h3>Repair Details</h3>
        <p><strong>🧾 Reference:</strong> ${data.ref}</p>
        <p><strong>👤 Name:</strong> ${data.name}</p>
        <p><strong>📱 Device:</strong> ${data.deviceType}</p>
        <p><strong>🧰 Service:</strong> ${data.serviceType || "N/A"}</p>

        <p><strong>Status:</strong> 
          <span class="status ${
            data.status === "Pending" ? "status-pending" :
            data.status === "In Progress" ? "status-progress" :
            data.status === "Completed" ? "status-completed" :
            "status-cancelled"
          }">
            ${data.status}
          </span>
        </p>

        <p><strong>🧑‍🔧 Technician:</strong> ${data.technician}</p>
        <p><strong>💰 Price Range:</strong> ${data.priceRange || "Not set yet"}</p>

        <p><strong>Payment Status:</strong>
          <span class="status ${
            data.paymentStatus === "Paid" ? "status-completed" :
            data.paymentStatus === "Pending" ? "status-progress" :
            data.paymentStatus === "Failed" ? "status-cancelled" :
            "status-pending"
          }">
            ${data.paymentStatus || "Unpaid"}
          </span>
        </p>

        <p><strong>💳 Payment Type:</strong> ${data.paymentType || "Deposit"}</p>
        <p><strong>💵 Requested Amount:</strong> ${data.paymentRequestedAmount || 0}</p>
        <p><strong>✅ Paid Amount:</strong> ${data.paymentAmount || 0}</p>
        <p><strong>🧾 M-Pesa Receipt:</strong> ${data.mpesaReceiptNumber || "N/A"}</p>

        <p><strong>🚚 Pickup Option:</strong> ${data.pickupOption}</p>
        <p><strong>⏱️ Last Updated:</strong> ${new Date(data.updatedAt).toLocaleString()}</p>

        ${
          data.paymentStatus !== "Paid" && Number(data.paymentRequestedAmount || 0) > 0
            ? `<button onclick="payNow('${data.ref}', '${document.getElementById("phone").value.trim()}')">Pay Now</button>`
            : ""
        }
      `;
      }

      async function payNow(ref, phone) {
        const response = await fetch('/api/mpesa/customer-pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref, phone })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(`${data.message || "Failed to initiate payment"}${data.error ? " - " + JSON.stringify(data.error) : ""}`);
          return;
        }

        alert("M-Pesa prompt sent to your phone. Waiting for confirmation...");

        // start auto-check
        startPaymentPolling(ref, phone);
      }

      let pollingInterval;

      function startPaymentPolling(ref, phone) {
        if (pollingInterval) clearInterval(pollingInterval);

        pollingInterval = setInterval(async () => {
          try {
            const response = await fetch('/api/bookings/lookup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ref, phone })
            });

            const data = await response.json();

            if (!response.ok) return;

            // re-render UI with new data
            renderResult(data); // 👈 we’ll fix this below

            if (data.paymentStatus === "Paid") {
              clearInterval(pollingInterval);
              alert("✅ Payment received successfully!");
            }

          } catch (err) {
            console.log("Polling error:", err);
          }
        }, 5000); // every 5 seconds
      }

  </script>
</body>
</html>
