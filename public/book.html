<!DOCTYPE html>
<html>
<head>
  <title>Book a Repair - Vinton Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="nav-logo">Vinton Solutions</div>

      <button class="menu-toggle" onclick="toggleMenu()">
        <i data-lucide="menu" class="icon"></i>
      </button>

      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/book">Book</a>
        <a href="/status">Track</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="dashboard-header">
      <img src="/images/logo.jpeg" class="logo" alt="Vinton Solutions Logo" />
      <div class="brand-title">Book a Repair</div>
      <div class="brand-sub">Tell us about your device and we’ll take it from there.</div>
    </div>

    <div id="booking-section" class="card">
      <h2 class="section-title">
        <i data-lucide="clipboard-list" class="icon"></i>
        Repair Booking Form
      </h2>

      <form id="bookingForm">
        <label for="name">
          <i data-lucide="user" class="icon"></i> Full Name
        </label>
        <input type="text" id="name" placeholder="Enter your full name" required />

        <label for="phone">
          <i data-lucide="phone" class="icon"></i> Phone Number
        </label>
        <input type="text" id="phone" placeholder="e.g. 0712345678" required />

        <label for="serviceType">
          <i data-lucide="wrench" class="icon"></i> Service Type
        </label>
        <select id="serviceType" required>
          <option value="">Select Service Type</option>
          <option value="Phone Repair">Phone Repair</option>
          <option value="Laptop Repair">Laptop Repair</option>
          <option value="TV Repair">TV Repair</option>
          <option value="Game Console Repair">Game Console Repair</option>
          <option value="Other">Other</option>
        </select>

        <label for="deviceType">
          <i data-lucide="smartphone" class="icon"></i> Device Type
        </label>
        <input type="text" id="deviceType" placeholder="e.g. iPhone 13, HP Laptop, Samsung TV" required />

        <label for="issueDescription">
          <i data-lucide="alert-circle" class="icon"></i> Issue Description
        </label>
        <textarea id="issueDescription" placeholder="Describe the problem" required></textarea>

        <label for="pickupOption">
          <i data-lucide="truck" class="icon"></i> Pickup Option
        </label>
        <select id="pickupOption">
          <option value="Walk-in">Walk-in</option>
          <option value="Pickup & Delivery">Pickup & Delivery</option>
        </select>

        <label for="locationNotes">
          <i data-lucide="map-pin" class="icon"></i> Location Notes
        </label>
        <input type="text" id="locationNotes" placeholder="If pickup: area + landmark (optional)" />

        <label for="bookingDate">
          <i data-lucide="calendar" class="icon"></i> Preferred Booking Date
        </label>
        <input type="date" id="bookingDate" required />

        <button type="submit">Submit Booking</button>
      </form>

      <p id="message" class="message"></p>
    </div>

    <div class="footer">
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/book">Book</a>
        <a href="/status">Track Repair</a>
      </div>
      <p>&copy; 2026 Vinton Solutions. All rights reserved.</p>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const navLinks = document.getElementById('navLinks');
      navLinks.classList.toggle('show');
    }

    document.getElementById('bookingForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const bookingData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        serviceType: document.getElementById('serviceType').value,
        deviceType: document.getElementById('deviceType').value,
        issueDescription: document.getElementById('issueDescription').value,
        pickupOption: document.getElementById('pickupOption').value,
        locationNotes: document.getElementById('locationNotes').value,
        bookingDate: document.getElementById('bookingDate').value
      };

      const response = await fetch('/api/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bookingData)
      });

      const data = await response.json();

      if (response.ok) {
        document.getElementById('message').innerText = "Booking submitted successfully!";
        document.getElementById('message').style.color = "green";
        document.getElementById('bookingForm').reset();
      } else {
        document.getElementById('message').innerText =
          "Error: " + (data.error || data.message || "Something went wrong");
        document.getElementById('message').style.color = "red";
      }
    });

    window.onload = function () {
      lucide.createIcons();
    };
  </script>
</body>
</html>
